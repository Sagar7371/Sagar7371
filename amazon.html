<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Amazon Clone</title>
  <link rel="stylesheet" href="amazon.css">
</head>
<body>
  <!-- Header -->
  <header>
    <div class="logo">
      <img src="https://upload.wikimedia.org/wikipedia/commons/a/a9/Amazon_logo.svg" alt="Amazon Logo">
    </div>
    <div class="search-bar">
      <input type="text" id="search" placeholder="Search for products...">
      <button onclick="searchProducts()">Search</button>
    </div>
    <div class="user">
      <span>Welcome, User</span>
      <button>Sign In</button>
    </div>
  </header>

  <!-- Main Section (Featured Products) -->
  <section class="featured">
    <h2>Featured Products</h2>
    <div class="product-grid">
      <div class="product">
        <img src="https://media-ik.croma.com/prod/https://media.croma.com/image/upload/v1697621337/Croma%20Assets/Entertainment/Headphones%20and%20Earphones/Images/257082_vl9gim.png?tr=w-600" alt="Product 1">
        <p>Product 1</p>
        <p>$10.00</p>
        <button>Add to Cart</button>
      </div>
      <div class="product">
        <img src="https://w7.pngwing.com/pngs/318/489/png-transparent-xbox-360-wireless-headset-microphone-headphones-bluetooth-sound-quality-bluetooth-sound-internet-mobile-phones-thumbnail.png" alt="Product 2">
        <p>Product 2</p>
        <p>$20.00</p>
        <button>Add to Cart</button>
      </div>
      <div class="product">
        <img src="https://wallpapers.com/images/hd/green-over-ear-headphones-sirmjmbxt0ng48o4-2.png" alt="Product 3">
        <p>Product 3</p>
        <p>$30.00</p>
        <button>Add to Cart</button>
      </div>
    </div>
  </section>

  <!-- Footer -->
  <footer>
    <p>&copy; 2025 Amazon Clone. All rights reserved.</p>
  </footer>

  <script src="amazon.js"></script>
</body>
</html>
